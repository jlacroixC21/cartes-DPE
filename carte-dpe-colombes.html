function getFiltered(){var res=[];D.forEach(function(r,idx){var ok1=(curDPE==='all'||r.d===curDPE);var dtInt=parseD(r.dt);var ok2=(dtInt>=curDateFrom&&dtInt<=curDateTo);var sv=r.s||0;var ok3=(sv===0||(sv>=curSurfMin&&sv<=curSurfMax));var ok4=(curType==='all'||r.t===curType);var ok5=(!searchText||r.a.toLowerCase().indexOf(searchText)>=0);if(ok1&&ok2&&ok3&&ok4&&ok5)res.push({r:r,idx:idx})});return res}

function updateList(filtered){var container=document.getElementById('list-items');var countEl=document.getElementById('list-count');countEl.textContent=filtered.length+' resultats';var html='';var max=500;var shown=Math.min(filtered.length,max);for(var i=0;i<shown;i++){var r=filtered[i].r;var idx=filtered[i].idx;var ip=r.d==='F'||r.d==='G';var passTag=ip?'<span class="list-passoire">PASSOIRE</span>':'';var sf=r.s?r.s+' m2':'';var typeLabel=r.t==='appartement'?'Appt':r.t==='maison'?'Maison':r.t==='immeuble'?'Immeuble':'';var etInfo=r.et?(r.et+' '):'';html+='<div class="list-item" data-idx="'+idx+'">';html+='<div class="list-dpe" style="background:'+COL[r.d]+'">'+r.d+'</div>';html+='<div class="list-info"><div class="list-addr">'+esc(r.a)+passTag+'</div>';html+='<div class="list-details">'+typeLabel+' '+etInfo+(r.co?r.co+' kWh/m2/an':'')+'</div></div>';html+='<div class="list-right">';if(sf)html+='<div class="list-surf">'+sf+'</div>';if(r.dt)html+='<div class="list-date">'+r.dt+'</div>';html+='</div></div>'}if(filtered.length>max)html+='<div class="list-count">Affichage limite a '+max+' sur '+filtered.length+'</div>';container.innerHTML=html}
document.getElementById('list-items').addEventListener('click',function(e){var item=e.target.closest('.list-item');if(!item)return;var idx=parseInt(item.dataset.idx);var r=D[idx];document.getElementById('vtab-carte').click();map.setView([r.la,r.lo],18);setTimeout(function(){am[idx].openPopup()},500)});
document.getElementById('vtab-carte').addEventListener('click',function(){document.getElementById('vtab-carte').classList.add('ac');document.getElementById('vtab-liste').classList.remove('ac');document.getElementById('map').style.display='block';document.getElementById('list-view').style.display='none';document.getElementById('tsw').style.display='flex';document.getElementById('lg').style.display='block';map.invalidateSize()});
document.getElementById('vtab-liste').addEventListener('click',function(){document.getElementById('vtab-liste').classList.add('ac');document.getElementById('vtab-carte').classList.remove('ac');document.getElementById('map').style.display='none';document.getElementById('list-view').style.display='block';document.getElementById('tsw').style.display='none';document.getElementById('lg').style.display='none';applyFilters()});
document.getElementById('list-search').addEventListener('input',function(e){searchText=e.target.value.toLowerCase();applyFilters()});
document.querySelectorAll('.tab').forEach(function(t){t.addEventListener('click',function(){document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('ac')});t.classList.add('ac');document.querySelectorAll('.filter-bar').forEach(function(b){b.classList.remove('visible')});document.getElementById('bar-'+t.dataset.tab).classList.add('visible')})});
document.getElementById('fl').addEventListener('click',function(e){var btn=e.target.closest('.fb');if(!btn)return;document.querySelectorAll('#fl .fb').forEach(function(b){b.classList.remove('ac')});btn.classList.add('ac');curDPE=btn.dataset.d;applyFilters()});
document.getElementById('dt-apply').addEventListener('click',function(){document.querySelectorAll('.dq').forEach(function(b){b.classList.remove('ac')});curDateFrom=dateToInt(document.getElementById('dt-from').value)||0;curDateTo=dateToInt(document.getElementById('dt-to').value)||99999999;applyFilters()});
document.getElementById('dt-reset').addEventListener('click',function(){document.getElementById('dt-from').value='2021-07-01';document.getElementById('dt-to').value='2026-12-31';document.querySelectorAll('.dq').forEach(function(b){b.classList.remove('ac')});curDateFrom=0;curDateTo=99999999;applyFilters()});
document.getElementById('dq').addEventListener('click',function(e){var btn=e.target.closest('.dq');if(!btn)return;document.querySelectorAll('.dq').forEach(function(b){b.classList.remove('ac')});btn.classList.add('ac');document.getElementById('dt-from').value=btn.dataset.from;document.getElementById('dt-to').value=btn.dataset.to;curDateFrom=dateToInt(btn.dataset.from);curDateTo=dateToInt(btn.dataset.to);applyFilters()});
var sMin=document.getElementById('surf-min');var sMax=document.getElementById('surf-max');var sMinV=document.getElementById('surf-min-val');var sMaxV=document.getElementById('surf-max-val');
function updateSurfLabels(){sMinV.textContent=sMin.value;sMaxV.textContent=parseInt(sMax.value)>=300?'300+':sMax.value}
sMin.addEventListener('input',function(){if(parseInt(sMin.value)>parseInt(sMax.value))sMax.value=sMin.value;updateSurfLabels()});sMax.addEventListener('input',function(){if(parseInt(sMax.value)<parseInt(sMin.value))sMin.value=sMax.value;updateSurfLabels()});
document.getElementById('surf-apply').addEventListener('click',function(){document.querySelectorAll('.sp').forEach(function(b){b.classList.remove('ac')});curSurfMin=parseInt(sMin.value);curSurfMax=parseInt(sMax.value)>=300?9999:parseInt(sMax.value);applyFilters()});
document.getElementById('surf-reset').addEventListener('click',function(){sMin.value=0;sMax.value=300;updateSurfLabels();document.querySelectorAll('.sp').forEach(function(b){b.classList.remove('ac')});curSurfMin=0;curSurfMax=9999;applyFilters()});
document.getElementById('sp').addEventListener('click',function(e){var btn=e.target.closest('.sp');if(!btn)return;document.querySelectorAll('.sp').forEach(function(b){b.classList.remove('ac')});btn.classList.add('ac');var mn=parseInt(btn.dataset.min);var mx=parseInt(btn.dataset.max);sMin.value=mn;sMax.value=mx;updateSurfLabels();curSurfMin=mn;curSurfMax=mx>=300?9999:mx;applyFilters()});
document.getElementById('tfl').addEventListener('click',function(e){var btn=e.target.closest('.tb');if(!btn)return;document.querySelectorAll('#tfl .tb').forEach(function(b){b.classList.remove('ac')});btn.classList.add('ac');curType=btn.dataset.type;applyFilters()});
applyFilters();map.addLayer(cl);
</script></body></html>
